name: Build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.runner }}
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
    env:
      CX_VERSION: '26.1.0'
      CX_TARBALL_SHA256: 'e4ec87d5821a009dd1f1d2e36ffe2e24b8fcbae9516375ea42f95a16928ab8fa'
      WINECX_DEPENDENCIES: 'bison ffmpeg freetype gstreamer mingw-w64 molten-vk pkgconfig'
      CC: clang
      CXX: clang++
      CFLAGS: -O3
      LDFLAGS: '-Wl,-headerpad_max_install_names -Wl,-rpath,@loader_path/../../'
    steps:
      - uses: actions/checkout@v5
      - name: Set up dependencies
        run: |
          {
          	cx_tarball_name="crossover-sources-$CX_VERSION.tar.gz"
          	curl -fsSO "https://media.codeweavers.com/pub/crossover/source/$cx_tarball_name"
          	printf %s "$CX_TARBALL_SHA256 $cx_tarball_name" | sha256sum -c --quiet -
          	tar -xzf "$cx_tarball_name" sources/wine
          } &

          if ${{ startsWith(matrix.runner, 'macos-') }}; then
          	# shellcheck disable=SC2086
          	brew install -- $WINECX_DEPENDENCIES
          fi

          wait
      - name: Set environment variables
        run: |
          library_path="$(brew --prefix)/lib"
          printf %s "LIBRARY_PATH=$library_path" >> "$GITHUB_ENV"
          path="$(brew --prefix bison)/bin"
          printf %s "$path" >> "$GITHUB_PATH"
      - name: Configure
        working-directory: sources/wine
        run: |
          mingw_prefix="$(brew --prefix mingw-w64)"

          ./configure \
          	--prefix= \
          	--enable-archs=i386,x86_64 \
          	--disable-tests \
          	--disable-winebth_sys \
          	--disable-winemenubuilder \
          	--without-alsa \
          	--without-capi \
          	--with-coreaudio \
          	--with-cups \
          	--without-dbus \
          	--with-ffmpeg \
          	--without-fontconfig \
          	--with-freetype \
          	--with-gettext \
          	--without-gettextpo \
          	--without-gphoto \
          	--with-gnutls \
          	--without-gssapi \
          	--with-gstreamer \
          	--without-inotify \
          	--without-krb5 \
          	--with-mingw="$mingw_prefix/bin/x86_64-w64-mingw32-gcc" \
          	--without-netapi \
          	--with-opencl \
          	--without-opengl \
          	--without-oss \
          	--with-pcap \
          	--with-pcsclite \
          	--with-pthread \
          	--without-pulse \
          	--without-sane \
          	--with-sdl \
          	--without-udev \
          	--with-unwind \
          	--without-usb \
          	--without-v4l2 \
          	--with-vulkan \
          	--without-wayland \
          	--without-x
      - name: Make
        working-directory: sources/wine
        run: |
          if command -v sysctl > /dev/null; then
          	nproc="$(sysctl -n hw.logicalcpu)" || true
          fi
          if [ -z "$nproc" ] && command -v nproc > /dev/null; then
          	nproc="$(nproc)" || true
          fi
          make ${nproc:+-j"$nproc"}
          make DESTDIR=../../dist/usr install-lib
      - name: Package
        working-directory: dist
        run: |
          mv "$GITHUB_WORKSPACE/sources/wine/"{LICENSE,README.md} .
          tar cf - -- * | gzip -9 > ../"winecx-$CX_VERSION-${{ matrix.target }}.tar.gz"
      - uses: actions/attest@v4
        with:
          subject-path: winecx-${{ env.CX_VERSION }}-${{ matrix.target }}.tar.gz
      - name: Upload the artifact
        uses: actions/upload-artifact@v7
        with:
          path: winecx-${{ env.CX_VERSION }}-${{ matrix.target }}.tar.gz
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifact
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifact/*
          draft: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
